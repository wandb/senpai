# SPDX-PackageName: senpai
#
# The advisor: a lightweight pod (no GPU) that runs Claude Code
# to manage research hypotheses via GitHub PRs. It creates hypotheses,
# assigns them to students, and reviews completed experiments.

apiVersion: v1
kind: Pod
metadata:
  name: senpai-advisor
  labels:
    app: senpai
    role: advisor
spec:
  serviceAccountName: senpai-orchestrator
  restartPolicy: Never
  containers:
  - name: advisor
    image: ghcr.io/tcapelle/dev_box:latest
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
      git clone --branch "$SENPAI_REPO_BRANCH" "$SENPAI_REPO_URL" /workspace/senpai
      cd /workspace/senpai
      bash k8s/entrypoint-advisor.sh
    env:
    - name: SENPAI_REPO_URL
      value: "https://github.com/wandb/senpai.git"
    - name: SENPAI_REPO_BRANCH
      value: "main"
    - name: SENPAI_RESEARCH_TAG
      value: "{{RESEARCH_TAG}}"
    - name: SENPAI_STUDENT_NAMES
      value: "{{STUDENT_NAMES}}"
    - name: WANDB_API_KEY
      valueFrom:
        secretKeyRef:
          name: senpai-secrets
          key: wandb-api-key
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: senpai-secrets
          key: anthropic-api-key
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: senpai-secrets
          key: github-token
    - name: WANDB_ENTITY
      value: "wandb-applied-ai-team"
    - name: WANDB_PROJECT
      value: "senpai-v1"
    resources:
      requests:
        cpu: "4"
        memory: "8Gi"
      limits:
        cpu: "8"
        memory: "16Gi"
    volumeMounts:
    - name: dataset
      mountPath: /mnt/new-pvc
  volumes:
  - name: dataset
    persistentVolumeClaim:
      claimName: new-pvc
