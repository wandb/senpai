# SPDX-PackageName: senpai
#
# The advisor: a lightweight deployment (no GPU) that runs Claude Code
# to manage research hypotheses via GitHub PRs. Loops every 5 minutes.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: senpai-advisor
  labels:
    app: senpai
    role: advisor
    research-tag: {{RESEARCH_TAG}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: senpai
      role: advisor
  template:
    metadata:
      labels:
        app: senpai
        role: advisor
        research-tag: {{RESEARCH_TAG}}
    spec:
      serviceAccountName: senpai-orchestrator
      containers:
      - name: advisor
        image: ghcr.io/wandb/senpai:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --branch "$REPO_BRANCH" "$REPO_URL" /workspace/senpai
          cd /workspace/senpai
          bash k8s/entrypoint-advisor.sh
        envFrom:
        - configMapRef:
            name: senpai-config-advisor
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: senpai-secrets
              key: wandb-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: senpai-secrets
              key: anthropic-api-key
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: senpai-secrets
              key: github-token
        - name: EXA_API_KEY
          valueFrom:
            secretKeyRef:
              name: senpai-secrets
              key: exa-api-key
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"
        volumeMounts:
        - name: dataset
          mountPath: /mnt/new-pvc
      volumes:
      - name: dataset
        persistentVolumeClaim:
          claimName: new-pvc
