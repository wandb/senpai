# SPDX-PackageName: senpai
#
# Template for a single autonomous research agent.
# Replace AGENT_NAME and RESEARCH_TAG before applying, or use launch.py.

apiVersion: batch/v1
kind: Job
metadata:
  name: senpai-AGENT_NAME
  labels:
    app: senpai
    research-tag: RESEARCH_TAG
spec:
  backoffLimit: 2
  # No TTL — agents run indefinitely until manually stopped
  template:
    metadata:
      labels:
        app: senpai
        agent: AGENT_NAME
    spec:
      restartPolicy: Never
      containers:
      - name: agent
        image: ghcr.io/tcapelle/senpai-agent:latest
        env:
        - name: SENPAI_REPO_URL
          value: "https://github.com/wandb/senpai.git"
        - name: SENPAI_REPO_BRANCH
          value: "main"
        - name: SENPAI_AGENT_ID
          value: AGENT_NAME
        - name: SENPAI_RESEARCH_TAG
          value: RESEARCH_TAG
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: senpai-secrets
              key: wandb-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: senpai-secrets
              key: anthropic-api-key
        - name: WANDB_ENTITY
          value: "WANDB_ENTITY_PLACEHOLDER"
        - name: WANDB_PROJECT
          value: "senpai"
        resources:
          requests:
            cpu: "8"
            memory: "64Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "16"
            memory: "128Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: dataset
          mountPath: /mnt/new-pvc
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
      - name: dataset
        persistentVolumeClaim:
          claimName: new-pvc
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
