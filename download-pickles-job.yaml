apiVersion: batch/v1
kind: Job
metadata:
  name: download-tandemfoil-pickles
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: downloader
        image: curlimages/curl:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          BASE="https://researchdata.ntu.edu.sg/api/access/datafile"
          DIR="/mnt/new-pvc/datasets/tandemfoil"
          mkdir -p "$DIR"

          # file_id filename pairs
          cat <<'FILELIST' | while read -r fid fname; do
          262610 cruise_randomFields_ive_Part1.pickle
          262614 cruise_randomFields_ive_Part2.pickle
          262620 cruise_randomFields_ive_Part3.pickle
          262609 cruise_randomFields_mgn_extrap_Part1.pickle
          262613 cruise_randomFields_mgn_extrap_Part2.pickle
          262616 cruise_randomFields_mgn_extrap_Part3.pickle
          262611 cruise_randomFields_mgn_Part1.pickle
          262612 cruise_randomFields_mgn_Part2.pickle
          262608 cruise_randomFields_mgn_Part3.pickle
          262593 cruise_Re500_aoa0_ive_Part1.pickle
          262595 cruise_Re500_aoa0_ive_Part2.pickle
          262594 cruise_Re500_aoa0_ive_Part3.pickle
          262601 cruise_Re500_aoa0_mgn_Part1.pickle
          262600 cruise_Re500_aoa0_mgn_Part2.pickle
          262602 cruise_Re500_aoa0_mgn_Part3.pickle
          262598 cruise_Re500_aoa5_ive_Part1.pickle
          262597 cruise_Re500_aoa5_ive_Part2.pickle
          262599 cruise_Re500_aoa5_ive_Part3.pickle
          262603 cruise_Re500_aoa5_mgn_Part1.pickle
          262604 cruise_Re500_aoa5_mgn_Part2.pickle
          262605 cruise_Re500_aoa5_mgn_Part3.pickle
          197247 raceCar_randomFields_mgn_Part1.pickle
          197249 raceCar_randomFields_mgn_Part2.pickle
          197248 raceCar_randomFields_mgn_Part3.pickle
          197246 raceCar_single_randomFields.pickle
          FILELIST
            if [ -f "$DIR/$fname" ]; then
              echo "SKIP (exists): $fname"
            else
              echo "Downloading: $fname (file_id=$fid)..."
              curl -L -o "$DIR/$fname" "$BASE/$fid"
              echo "Done: $fname"
            fi
          done
          echo "All downloads complete."
          ls -lh "$DIR"
        volumeMounts:
        - name: vast-storage
          mountPath: /mnt/new-pvc
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
      volumes:
      - name: vast-storage
        persistentVolumeClaim:
          claimName: new-pvc
